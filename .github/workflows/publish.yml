name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Verify release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"
          git fetch origin main --depth=1
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

      - run: npm ci
      - run: npm run check:release
      - run: npm audit --omit=dev --audit-level=moderate

  publish:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify npm trusted publishing runtime
        run: |
          node -e "const [major, minor, patch] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && (minor < 14 || (minor === 14 && patch < 0)))) process.exit(1)"
          npm --version
          node -e "const v=require('node:child_process').execFileSync('npm',['--version'],{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && (v[1] < 5 || (v[1] === 5 && v[2] < 1)))) process.exit(1)"

      - name: Verify release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"

      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run lint:public-surface
      - run: npm publish --ignore-scripts --access public
